name: CI

on:
  push:
    branches: [ master ]

jobs:
  build:

    runs-on: windows-latest

    steps:
    - name: Install VS2013
      run: choco install visualstudiocommunity2013
    - name: Setup MSBuild.exe
      uses: microsoft/setup-msbuild@master
      with:
        vs-version: "12.0"
    - uses: actions/checkout@master
    - name: MSBuild
      run: msbuild /t:BH:Rebuild /p:Configuration=Release /p:PlatformToolset=v120 BH.sln 
    - uses: actions/upload-artifact@v2
      with:
        name: BH.dll
        path: Release/BH.dll
